<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TimeTiers</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#c9d1d9}
header{display:flex;justify-content:space-between;padding:15px;background:#0a0f19}
nav a{margin-left:15px;color:#c9d1d9;text-decoration:none;padding:6px 10px;border-radius:6px}
.active-link,.mobile-active{background:#2383ff;color:#fff}
.container{max-width:800px;margin:auto;padding:20px}

.player-card{display:flex;justify-content:space-between;padding:10px;margin:8px 0;background:#111a2b;border-radius:10px;cursor:pointer}
.top1{border:2px solid gold}
.top2{border:2px solid silver}
.top3{border:2px solid #cd7f32}

.left{display:flex;gap:10px}
.tiers{display:grid;grid-template-columns:repeat(4,50px);gap:5px}
.tier{text-align:center;background:#1f2a3a;border-radius:5px;font-size:12px}

.rank-Splus{color:gold}
.rank-S{color:#58a6ff}
.rank-A{color:#3fb950}
.rank-B{color:#d29922}
.rank-C{color:#f85149}

.modal{position:fixed;top:0;left:0;width:100%;height:100%;display:none;justify-content:center;align-items:center;background:rgba(0,0,0,0.7)}
.modal-content{background:#111a2b;padding:20px;border-radius:12px;width:300px}
.avatar{width:60px;height:60px;border-radius:10px}

.avatar.gold{border:2px solid gold}
.avatar.silver{border:2px solid silver}
.avatar.bronze{border:2px solid #cd7f32}
</style>
</head>

<body>

<header>
<h1>TimeTiers</h1>
<nav>
<a href="#leaderboard" id="navLeaderboard">Leaderboard</a>
<a href="#info" id="navInfo">Info</a>
<a href="#contact" id="navContact">Contact</a>
<a href="#" id="mobileBtn">Mobile</a>
</nav>
</header>

<div class="container">

<input id="search" placeholder="Search player..." style="width:100%;padding:8px;margin-bottom:10px">

<div style="display:flex;justify-content:space-between;font-weight:bold">
<div># Name</div>
<div class="tiers">
<div>Bounce</div><div>CC</div><div>EV</div><div>Overall</div>
</div>
</div>

<div id="leaderboard"></div>

<h2 id="info">Info</h2>
<p>Ranking players based on overall skill across ETOH, SpeedBlox, and similar non-rhythm games.</p>

<h2 id="contact">Contact</h2>
<p>somberkidd@gmail.com</p>
<p style="font-size:12px">© TimeTiers</p>

</div>

<div id="modal" class="modal">
<div class="modal-content">
<img id="m-avatar" class="avatar">
<h3 id="m-name"></h3>
<p id="m-rank"></p>
<p id="m-region"></p>
<div id="m-overall"></div>
<div id="m-bounce"></div>
<div id="m-cc"></div>
<div id="m-evuuz"></div>
<button onclick="closeModal()">Close</button>
</div>
</div>

<script>
function getRank(pos){
if(pos===1)return{label:'S+',class:'rank-Splus'}
if(pos<=10)return{label:'S',class:'rank-S'}
if(pos<=25)return{label:'A',class:'rank-A'}
return{label:'B',class:'rank-B'}
}

let mobile=false
let players=[]

function build(){
players=[]
for(let i=1;i<=50;i++){
let name=i===1?'ThePersonYouMetNow':'Player '+i
players.push({
id:i,
name,
overall:getRank(i),
bounce:getRank(i),
cc:getRank(i),
evuuz:getRank(i),
region:['NA','EU','SA','AS','AU','AF'][i%6]
})
}
render(players)
}

function render(list){
let el=document.getElementById('leaderboard')
el.innerHTML=''

list.forEach(p=>{
let div=document.createElement('div')
div.className='player-card'
if(p.id==1)div.classList.add('top1')
if(p.id==2)div.classList.add('top2')
if(p.id==3)div.classList.add('top3')

div.innerHTML=`
<div class="left">#${p.id} ${p.name}</div>
<div class="tiers">
<div class="${p.bounce.class}">${p.bounce.label}</div>
<div class="${p.cc.class}">${p.cc.label}</div>
<div class="${p.evuuz.class}">${p.evuuz.label}</div>
<div class="${p.overall.class}">${p.overall.label}</div>
</div>`

div.onclick=()=>openModal(p)
el.appendChild(div)
})
}

document.getElementById('search').addEventListener('input',e=>{
let q=e.target.value.toLowerCase()
render(players.filter(p=>p.name.toLowerCase().includes(q)))
})

function openModal(p){
document.getElementById('modal').style.display='flex'
document.getElementById('m-name').innerText=p.name
document.getElementById('m-rank').innerText='Rank #'+p.id
document.getElementById('m-region').innerText=p.region

let avatar=document.getElementById('m-avatar')
avatar.className='avatar'

if(p.id==1)avatar.classList.add('gold')
if(p.id==2)avatar.classList.add('silver')
if(p.id==3)avatar.classList.add('bronze')

fetch(`https://thumbnails.roblox.com/v1/users/avatar-headshot?userIds=669007006&size=150x150&format=Png&isCircular=false`)
.then(r=>r.json())
.then(d=>{
avatar.src=d.data?.[0]?.imageUrl||''
})
}

function closeModal(){
document.getElementById('modal').style.display='none'
}

build()
</script>

</body>
</html>
