<!DOCTYPE html>
<html>
<head>
  <title>TimeTiers</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #020617);
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
      font-size: 40px;
    }

    .leaderboard {
      max-width: 900px;
      margin: auto;
    }

    .player {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0f172a;
      margin: 10px 0;
      padding: 15px;
      border-radius: 10px;
      transition: 0.2s;
      border: 1px solid rgba(255,255,255,0.05);
    }

    .player:hover {
      transform: scale(1.02);
      background: #1e293b;
    }

    .left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .rank {
      font-size: 22px;
      font-weight: bold;
      width: 40px;
      text-align: right;
    }

    .name {
      font-size: 18px;
      font-weight: bold;
    }

    .time {
      opacity: 0.7;
      font-size: 14px;
    }

    .tier {
      padding: 5px 12px;
      border-radius: 6px;
      font-weight: bold;
      font-size: 14px;
    }

    .S { background: #ff4d4d; }
    .A { background: #ff944d; }
    .B { background: #ffd24d; color: black; }
    .C { background: #4dff88; color: black; }
    .D { background: #4da6ff; }

  </style>
</head>

<body>

<h1>⏱️ TimeTiers Leaderboard</h1>

<div class="leaderboard" id="board"></div>

<script>
  const board = document.getElementById("board");

  function getTier(rank) {
    if (rank <= 5) return "S";
    if (rank <= 15) return "A";
    if (rank <= 35) return "B";
    if (rank <= 70) return "C";
    return "D";
  }

  for (let i = 1; i <= 100; i++) {
    let player = document.createElement("div");
    player.className = "player";

    let tier = getTier(i);

    player.innerHTML = `
      <div class="left">
        <div class="rank">#${i}</div>
        <div>
          <div class="name">Player${i}</div>
          <div class="time">${Math.floor(Math.random()*60)+1}:${Math.floor(Math.random()*60).toString().padStart(2,"0")}</div>
        </div>
      </div>
      <div class="tier ${tier}">${tier}</div>
    `;

    board.appendChild(player);
  }
</script>

</body>
</html>
